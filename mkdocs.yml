site_name: GEE ACOLITE Documentation
site_description: Atmospheric correction with ACOLITE for Google Earth Engine
site_author: Sergio
repo_url: https://github.com/Aouei/gee_acolite
repo_name: Aouei/gee_acolite

theme:
  name: material
  language: en
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow

plugins:
  - search:
      lang:
        - en
  - mkdocs-jupyter:
      execute: false
      include_source: true
      ignore_h1_titles: true
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_signature_annotations: true
            signature_crossrefs: true
            separate_signature: true
            merge_init_into_class: true
            docstring_section_style: table
            members_order: source
            filters:
              - "!^_"  # Excluir métodos privados
  - mermaid2:
      version: 10.6.1

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
    - Home: index.md
    - User Guide:
      - Installation: guide/installation.md
      - Dependencies: guide/dependencies.md
      - Quickstart: guide/quickstart.md
      - Examples: guide/examples.md
      - Configuration: guide/configuration.md
    - API Reference:
      - Atmospheric Correction: api/correction.md
      - Water Quality: api/water_quality.md
      - Bathymetry: api/bathymetry.md
      - Utilities:
        - Image Search: api/utils/search.md
        - L1 Conversion: api/utils/l1_convert.md
        - Masks: api/utils/masks.md
      - Sensors: api/sensors/sentinel2.md
    - Architecture:
      - Class Diagram: architecture/class_diagram.md
      - Data Flow: architecture/data_flow.md
      - GEE Integration: architecture/gee_integration.md
    - Notebooks:
      - Bathymetry (Caballero & Stumpf): jupyters/SDB_caballero_stumpf.ipynb
    - Contribute: contributing.md
    - About: about.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Aouei/gee_acolite
