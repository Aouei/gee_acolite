name: Release and Publish to PyPI

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write  # Required for PyPI trusted publishing (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    # Only run when commit message contains a release tag
    if: |
      contains(github.event.head_commit.message, '[release-major]') ||
      contains(github.event.head_commit.message, '[release-minor]') ||
      contains(github.event.head_commit.message, '[release-patch]')

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Detect version bump type
      id: bump_type
      run: |
        MSG="${{ github.event.head_commit.message }}"
        if echo "$MSG" | grep -q '\[release-major\]'; then
          echo "type=major" >> $GITHUB_OUTPUT
        elif echo "$MSG" | grep -q '\[release-minor\]'; then
          echo "type=minor" >> $GITHUB_OUTPUT
        else
          echo "type=patch" >> $GITHUB_OUTPUT
        fi

    - name: Bump version in pyproject.toml
      id: version
      run: |
        # Read current version
        CURRENT=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
        MAJOR=$(echo $CURRENT | cut -d. -f1)
        MINOR=$(echo $CURRENT | cut -d. -f2)
        PATCH=$(echo $CURRENT | cut -d. -f3)

        # Bump the right component
        TYPE="${{ steps.bump_type.outputs.type }}"
        if [ "$TYPE" = "major" ]; then
          MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
        elif [ "$TYPE" = "minor" ]; then
          MINOR=$((MINOR + 1)); PATCH=0
        else
          PATCH=$((PATCH + 1))
        fi

        NEW="$MAJOR.$MINOR.$PATCH"
        sed -i "s/^version = \"$CURRENT\"/version = \"$NEW\"/" pyproject.toml

        echo "old=$CURRENT" >> $GITHUB_OUTPUT
        echo "new=$NEW"     >> $GITHUB_OUTPUT

    - name: Commit version bump and tag
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add pyproject.toml
        git commit -m "chore: bump version ${{ steps.version.outputs.old }} → ${{ steps.version.outputs.new }} [skip ci]"
        git tag "v${{ steps.version.outputs.new }}"
        git push origin main --tags

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v${{ steps.version.outputs.new }}"
        name: "v${{ steps.version.outputs.new }}"
        body: |
          ## gee_acolite v${{ steps.version.outputs.new }}

          **Changes since v${{ steps.version.outputs.old }}:**

          ${{ github.event.head_commit.message }}

          ---
          Install: `pip install gee_acolite==${{ steps.version.outputs.new }}`
          Install with visualization extras: `pip install "gee_acolite[viz]==${{ steps.version.outputs.new }}"`

    - name: Build package
      run: |
        pip install build
        python -m build

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

    - name: Trigger documentation deployment
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.repos.createDispatchEvent({
            owner: context.repo.owner,
            repo:  context.repo.repo,
            event_type: 'trigger-docs',
          })
